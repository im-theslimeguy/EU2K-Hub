<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EU2K Hub - Admin Konzol</title>
    <script>
    (function(){
      if (!document.getElementById('eu2k-page-overlay')) {
        var o = document.createElement('div');
        o.id = 'eu2k-page-overlay';
        o.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0B0F0B;border-radius:32px;opacity:1;transition:opacity 300ms ease-in-out;';
        var inner = document.createElement('div');
        inner.style.cssText = 'position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0B0F0B;border-radius:32px;';
        var m = document.createElement('div');
        m.id = 'eu2k-overlay-mount';
        m.style.cssText = 'position:relative;width:100%;height:100%';
        inner.appendChild(m);
        o.appendChild(inner);
        document.documentElement.appendChild(o);
      }
    })();
  </script>
  <script>
    (function installConsoleFilter() {
      if (window.__eu2kConsoleFilterInstalled) return;
      window.__eu2kConsoleFilterInstalled = true;

      const DEV_MODE_KEY = 'eu2k-dev-mode';
      const original = {
        log: console.log.bind(console),
        info: console.info.bind(console),
        debug: console.debug.bind(console),
        warn: console.warn.bind(console),
        error: console.error.bind(console)
      };

      const isDevModeEnabled = () => {
        try {
          return localStorage.getItem(DEV_MODE_KEY) === 'true';
        } catch {
          return false;
        }
      };

      console.log = (...args) => {
        if (isDevModeEnabled()) original.log(...args);
      };
      console.info = (...args) => {
        if (isDevModeEnabled()) original.info(...args);
      };
      console.debug = (...args) => {
        if (isDevModeEnabled()) original.debug(...args);
      };
      console.warn = (...args) => original.warn(...args);
      console.error = (...args) => original.error(...args);
    })();
  </script>
    <script src="/EU2K-Hub/assets/js/page-overlay-loader.js"></script>
    <link rel="stylesheet" href="assets/css/consent-banner.css">
    <script src="assets/js/consent-banner.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px #0000001A;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 5px solid #4facfe;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4facfe;
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px #4FACFE66;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
        }

        .btn-danger:hover {
            box-shadow: 0 5px 15px #FF6B6B66;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .users-table th, .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .users-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        .users-table tr:hover {
            background: #f5f5f5;
        }

        .claims-badge {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            background: #4facfe;
            color: white;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Admin Konzol</h1>
            <p>EU2K Hub Custom Claims Kezelő</p>
            <div id="connectionStatus" class="status disconnected">
                ❌ Firebase kapcsolat: Nincs kapcsolat
            </div>
        </div>

        <div class="main-content">
            <!-- Felhasználó Claims Beállítása -->
            <div class="section">
                <h2>👤 Felhasználó Jogosultságok Beállítása</h2>
                <div class="form-group">
                    <label for="userId">Felhasználó ID (UID):</label>
                    <input type="text" id="userId" placeholder="Pl: abc123def456...">
                </div>
                <div class="form-group">
                    <label for="userRole">Szerepkör:</label>
                    <select id="userRole">
                        <option value="student">Diák</option>
                        <option value="parent">Szülő</option>
                        <option value="teacher">Tanár</option>
                        <option value="admin">Admin</option>
                        <option value="owner">Tulajdonos</option>
                    </select>
                </div>
                <button class="btn" onclick="setUserClaims()">Jogosultságok Beállítása</button>
                <div id="setClaimsResult" class="result" style="display: none;"></div>
            </div>

            <!-- Felhasználó Claims Lekérése -->
            <div class="section">
                <h2>🔍 Felhasználó Jogosultságok Lekérése</h2>
                <div class="form-group">
                    <label for="queryUserId">Felhasználó ID (UID) - üres = saját:</label>
                    <input type="text" id="queryUserId" placeholder="Pl: abc123def456... (üres = saját adatok)">
                </div>
                <button class="btn" onclick="getUserClaims()">Jogosultságok Lekérése</button>
                <div id="getClaimsResult" class="result" style="display: none;"></div>
            </div>

            <!-- Felhasználók Listázása -->
            <div class="section">
                <h2>📋 Felhasználók Listázása</h2>
                <div class="form-group">
                    <label for="maxResults">Maximum eredmények száma:</label>
                    <input type="number" id="maxResults" value="50" min="1" max="1000">
                </div>
                <button class="btn" onclick="listUsers()">Felhasználók Listázása</button>
                <button class="btn" onclick="refreshUserList()">Lista Frissítése</button>
                <div id="listUsersResult" class="result" style="display: none;"></div>
                <div id="usersTableContainer"></div>
            </div>

            <!-- Claims Törlése -->
            <div class="section">
                <h2>🗑️ Jogosultságok Törlése</h2>
                <div class="form-group">
                    <label for="removeUserId">Felhasználó ID (UID):</label>
                    <input type="text" id="removeUserId" placeholder="Pl: abc123def456...">
                </div>
                <button class="btn btn-danger" onclick="removeUserClaims()">Jogosultságok Törlése</button>
                <div id="removeClaimsResult" class="result" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>

    <script>
        // Firebase konfiguráció
        const firebaseConfig = {
            apiKey: "AIzaSyBQ-kTJJDROYQCPqUZdGGBRHhHhHhHhHhH",
            authDomain: "eu2k-hub.firebaseapp.com",
            projectId: "eu2k-hub",
            storageBucket: "eu2k-hub.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef123456789012345"
        };

        // Firebase inicializálás
        let app, auth, functions;
        let currentUser = null;

        try {
            app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            functions = firebase.functions();
            
            // Emulator használata fejlesztéshez
            functions.useEmulator('localhost', 5001);
            
            updateConnectionStatus(true);
        } catch (error) {
            console.error('Firebase inicializálási hiba:', error);
            updateConnectionStatus(false);
        }

        // Kapcsolat állapot frissítése
        function updateConnectionStatus(connected) {
            const statusElement = document.getElementById('connectionStatus');
            if (connected) {
                statusElement.className = 'status connected';
                statusElement.innerHTML = '✅ Firebase kapcsolat: Aktív';
            } else {
                statusElement.className = 'status disconnected';
                statusElement.innerHTML = '❌ Firebase kapcsolat: Nincs kapcsolat';
            }
        }

        // Auth állapot figyelése
        if (auth) {
            auth.onAuthStateChanged((user) => {
                currentUser = user;
                if (user) {
                    console.log('Bejelentkezett felhasználó:', user.uid);
                } else {
                    console.log('Nincs bejelentkezett felhasználó');
                }
            });
        }

        // Eredmény megjelenítése
        function showResult(elementId, content, isError = false) {
            const element = document.getElementById(elementId);
            element.style.display = 'block';
            element.className = `result ${isError ? 'error' : 'success'}`;
            element.textContent = typeof content === 'object' ? JSON.stringify(content, null, 2) : content;
        }

        // Custom Claims beállítása
        async function setUserClaims() {
            const userId = document.getElementById('userId').value.trim();
            const role = document.getElementById('userRole').value;

            if (!userId) {
                showResult('setClaimsResult', 'Hiba: Felhasználó ID megadása kötelező!', true);
                return;
            }

            try {
            const setCustomClaims = functions.httpsCallable('setCustomClaims');
            const result = await setCustomClaims({ userId, role });
            showResult('setClaimsResult', `✅ Sikeres beállítás\nFelhasználó ID: ${userId}\nSzerepkör: ${role}\nEredmény: ${JSON.stringify(result.data, null, 2)}`, false);
        } catch (error) {
            console.error('Hiba a claims beállításakor:', error);
            showResult('setClaimsResult', `❌ Hiba: ${error.message}`, true);
        }
        }

        // Felhasználó Claims lekérése
        async function getUserClaims() {
            const userId = document.getElementById('queryUserId').value.trim();

            try {
                const getUserClaims = functions.httpsCallable('getUserClaims');
                
                const result = await getUserClaims({ userId });
                const claims = result.data.claims;
                const email = result.data.email;
                
                let claimsText = 'Nincs custom claim beállítva';
                if (Object.keys(claims).length > 0) {
                    claimsText = JSON.stringify(claims, null, 2);
                }
                
                showResult('getClaimsResult', `✅ Claims lekérve\nFelhasználó: ${email}\nUID: ${userId}\n\nCustom Claims:\n${claimsText}`, false);
            } catch (error) {
                console.error('Hiba a claims lekérésekor:', error);
                showResult('getClaimsResult', `❌ Hiba: Nem sikerült lekérni a claims-eket: ${error.message}`, true);
            }
        }

        // Felhasználók listázása
        async function listUsers() {
            const maxResults = parseInt(document.getElementById('maxResults').value) || 50;

            try {
                const listUsers = functions.httpsCallable('listUsers');
                
                const result = await listUsers({ maxResults });
                const users = result.data.users;
                
                if (users.length === 0) {
                    showResult('listUsersResult', 'Nincsenek felhasználók.', false);
                    return;
                }
                
                displayUsersTable(users);
                showResult('listUsersResult', `✅ ${users.length} felhasználó betöltve`, false);
            } catch (error) {
                console.error('Hiba a felhasználók listázásakor:', error);
                showResult('listUsersResult', `❌ Hiba: Nem sikerült betölteni a felhasználókat: ${error.message}`, true);
            }
        }

        // Felhasználók táblázat megjelenítése
        function displayUsersTable(users) {
            const container = document.getElementById('usersTableContainer');
            
            if (users.length === 0) {
                container.innerHTML = '<p>Nincsenek felhasználók.</p>';
                return;
            }

            let tableHTML = `
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>UID</th>
                            <th>Email</th>
                            <th>Név</th>
                            <th>Jogosultságok</th>
                            <th>Létrehozva</th>
                            <th>Utolsó bejelentkezés</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach(user => {
                const claims = user.customClaims || {};
                const claimsHTML = Object.keys(claims).map(key => 
                    `<span class="claims-badge">${key}: ${claims[key]}</span>`
                ).join('');

                tableHTML += `
                    <tr>
                        <td>${user.uid}</td>
                        <td>${user.email || 'N/A'}</td>
                        <td>${user.displayName || 'N/A'}</td>
                        <td>${claimsHTML || 'Nincs'}</td>
                        <td>${new Date(user.creationTime).toLocaleString('hu-HU')}</td>
                        <td>${user.lastSignInTime ? new Date(user.lastSignInTime).toLocaleString('hu-HU') : 'Soha'}</td>
                    </tr>
                `;
            });

            tableHTML += '</tbody></table>';
            container.innerHTML = tableHTML;
        }

        // Lista frissítése
        function refreshUserList() {
            listUsers();
        }

        // Claims törlése
        async function removeUserClaims() {
            const userId = document.getElementById('removeUserId').value.trim();

            if (!userId) {
                showResult('removeClaimsResult', 'Hiba: Felhasználó ID megadása kötelező!', true);
                return;
            }

            if (!confirm(`Biztosan törölni szeretnéd a felhasználó (${userId}) jogosultságait?`)) {
                return;
            }

            try {
                const removeCustomClaims = functions.httpsCallable('removeCustomClaims');
                const result = await removeCustomClaims({ userId });
                
                showResult('removeClaimsResult', `✅ Claims törölve\nCustom claims sikeresen törölve a felhasználótól: ${userId}`, false);
                
                // Frissítjük a felhasználók listáját ha látható
                const usersTableContainer = document.getElementById('usersTableContainer');
                if (usersTableContainer && usersTableContainer.innerHTML.trim() !== '') {
                    refreshUserList();
                }
            } catch (error) {
                console.error('Hiba a claims törlésekor:', error);
                showResult('removeClaimsResult', `❌ Hiba: Nem sikerült törölni a claims-eket: ${error.message}`, true);
            }
        }

        // Oldal betöltésekor
        window.addEventListener('load', () => {
            console.log('Admin konzol betöltve');
            
            // Ellenőrizzük a Firebase kapcsolatot
            if (auth.currentUser) {
                showResult('setClaimsResult', 
                    '✅ Firebase Admin Konzol\n\n' +
                    '🔗 Kapcsolat: Aktív\n' +
                    '👤 Bejelentkezve: ' + (auth.currentUser.email || 'Ismeretlen') + '\n\n' +
                    'Elérhető funkciók:\n' +
                    '• Custom claims kezelése\n' +
                    '• Felhasználók listázása\n' +
                    '• Jogosultságok beállítása', 
                    false);
            } else {
                showResult('setClaimsResult', 
                    '⚠️ Firebase Admin Konzol\n\n' +
                    '🔗 Kapcsolat: Nincs bejelentkezve\n' +
                    'Kérlek jelentkezz be a funkciók használatához.', 
                    true);
            }
        });
    </script>

    <!-- Developer Mode Popup -->
    <div id="devModePopup" class="permission-overlay-scroll-area" style="display: none;">
      <div class="permission-container">
        <button class="permission-close-btn" onclick="closeDevModePopup()">
          <img src="assets/general/close.svg" alt="Bezárás">
        </button>
        <div class="permission-content">
          <img src="assets/global/dev.svg" class="permission-hand-icon dev-mode-popup-icon" alt="Developer mód">
          <h2 class="permission-title" data-translate="youhub.dev_mode.title" data-translate-fallback="Developer Mód">Developer Mód</h2>
          <p class="permission-text" data-translate="youhub.dev_mode.text" data-translate-fallback="Jelszó megadása:">Jelszó megadása:</p>
          <input type="password" id="devModePassword" class="dev-mode-input" data-translate-placeholder="youhub.dev_mode.password_placeholder" placeholder="Jelszó">
          <button class="permission-ok-btn" onclick="checkDevModePassword()" data-translate="youhub.dev_mode.login_button" data-translate-fallback="Bejelentkezés">Bejelentkezés</button>
        </div>
      </div>
    </div>

    <script src="assets/js/developer-mode.js"></script>
    <script src="assets/js/account-tooltip.js"></script>
  <script src="assets/js/security.js"></script>
</body>
</html>
